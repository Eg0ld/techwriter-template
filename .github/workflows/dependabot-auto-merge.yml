name: Dependabot Auto-merge

on:
  pull_request:
    types: [opened, synchronize, reopened]
  check_suite:
    types: [completed]

permissions:
  pull-requests: write
  contents: write

jobs:
  auto-merge-on-pr:
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request' && github.actor == 'dependabot[bot]'
    steps:
      - name: Enable auto-merge
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PR_NUMBER="${{ github.event.pull_request.number }}"
          set +e
          MERGE_OUTPUT="$(gh pr merge "$PR_NUMBER" --auto --squash --repo "${{ github.repository }}" 2>&1)"
          MERGE_EXIT=$?
          set -e

          if [ "$MERGE_EXIT" -eq 0 ]; then
            echo "Auto-merge enabled for PR #$PR_NUMBER"
            exit 0
          fi

          if echo "$MERGE_OUTPUT" | grep -q "Auto merge is not allowed for this repository"; then
            echo "Repository auto-merge is disabled; skipping auto-merge enable on PR event."
            exit 0
          fi

          echo "$MERGE_OUTPUT"
          exit "$MERGE_EXIT"

  auto-merge-on-check-suite:
    runs-on: ubuntu-latest
    if: github.event_name == 'check_suite' && github.event.check_suite.conclusion == 'success'
    steps:
      - name: Enable auto-merge on passing Dependabot PRs
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Find open Dependabot PRs whose head SHA matches this check suite
          HEAD_SHA="${{ github.event.check_suite.head_sha }}"
          mapfile -t PR_NUMBERS < <(gh pr list \
            --repo "${{ github.repository }}" \
            --author "app/dependabot" \
            --state open \
            --json number,headRefOid \
            --jq ".[] | select(.headRefOid == \"$HEAD_SHA\") | .number")

          for PR_NUMBER in "${PR_NUMBERS[@]}"; do
              [ -z "$PR_NUMBER" ] && continue
              set +e
              MERGE_OUTPUT="$(gh pr merge "$PR_NUMBER" --auto --squash --repo "${{ github.repository }}" 2>&1)"
              MERGE_EXIT=$?
              set -e

              if [ "$MERGE_EXIT" -eq 0 ]; then
                echo "Auto-merge enabled for PR #$PR_NUMBER"
                continue
              fi

              if echo "$MERGE_OUTPUT" | grep -q "Auto merge is not allowed for this repository"; then
                echo "Repository auto-merge is disabled; attempting direct squash merge for PR #$PR_NUMBER."
                gh pr merge "$PR_NUMBER" --squash --repo "${{ github.repository }}" || true
                continue
              fi

              echo "$MERGE_OUTPUT"
              exit "$MERGE_EXIT"
            done
