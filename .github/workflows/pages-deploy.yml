# ─────────────────────────────────────────────────────────────────────────────
# Autoscribe — Build & deploy the Docusaurus site to GitHub Pages
#
# Runs on every push to main (i.e. after an Autoscribe doc PR is merged) and on
# demand. Builds the static site and deploys it with the official GitHub Pages
# actions — no third-party deploy infra. Pages source must be set to "GitHub
# Actions" in repo Settings → Pages (the control plane sets this at scaffold
# time).
# ─────────────────────────────────────────────────────────────────────────────
name: Deploy · GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

# Pages deploys need write to Pages + an OIDC token for deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; let an in-flight run finish (don't cancel a
# live deploy mid-publish).
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # 1) Build the Docusaurus static site → ./build, upload as the Pages artifact.
  build:
    # The template repo itself has no Pages site (the control plane enables
    # Pages on scaffolded repos) — skip there so pushes to the template don't
    # fail. Scaffolded copies have is_template=false and run normally.
    if: ${{ !github.event.repository.is_template }}
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20

      - name: Configure Pages
        # Injects the correct baseUrl/site URL for the project Pages path.
        uses: actions/configure-pages@45bfe0192ca1faeb007ade9deae92b16b8254a0d # v6.0.0

      - name: Install dependencies
        run: npm install --no-audit --no-fund

      - name: Build Docusaurus
        # The template's docusaurus.config reads url/baseUrl/GH_ORG/GH_REPO from
        # these env vars. A project Pages site lives at
        # https://<owner>.github.io/<repo>/, so baseUrl MUST be /<repo>/ — without
        # it every CSS/JS asset 404s and Docusaurus shows its "site did not load
        # properly (wrong baseUrl)" error. If the repo pins a custom domain via
        # static/CNAME, it serves at the domain root instead, so baseUrl is '/'.
        run: |
          set -euo pipefail
          OWNER="${GITHUB_REPOSITORY%%/*}"
          REPO="${GITHUB_REPOSITORY#*/}"
          if [ -f static/CNAME ]; then
            SITE_URL="https://$(tr -d '[:space:]' < static/CNAME)"
            BASE_URL="/"
          else
            SITE_URL="https://${OWNER}.github.io"
            BASE_URL="/${REPO}/"
          fi
          echo "Building site → url=$SITE_URL  baseUrl=$BASE_URL"
          SITE_URL="$SITE_URL" BASE_URL="$BASE_URL" GH_ORG="$OWNER" GH_REPO="$REPO" \
            npm run build   # Docusaurus outputs static files to ./build

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./build

  # 2) Deploy the uploaded artifact to the github-pages environment.
  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 10
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@cd2ce8fcbc39b97be8ca5fce6e763baed58fa128 # v5.0.0
